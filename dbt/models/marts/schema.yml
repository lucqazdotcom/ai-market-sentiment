version: 2

models:
  - name: mart_market_contradiction
    description: "Delta between job inventory and media outlook."
    columns:
      - name: company
        description: "Company being tracked."
        tests:
          - not_null

      - name: day_ran
        description: "Date for when query ran."
        tests:
          - not_null

      - name: total_visible_roles
        description: "Total job inventory across all search terms."
        tests:
          - not_null
